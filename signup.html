<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .error-text { 
      font-size: 13px; 
      color: #ff4b4b; 
      margin-top: 4px; 
      display: flex; 
      align-items: center; 
      gap: 4px;
    }
    .success-popup {
      background: #00C29A;
      color: white;
      padding: 15px 20px;
      border-radius: 10px;
      position: fixed;
      top: 20px;
      right: 20px;
      font-weight: 600;
      display: none;
    }
  </style>
   <title>Compass Housing Template</title>
    <style>
      body::before {
      content: "";
      position: fixed;
      inset: 0;
      margin: auto;
      background-image: url("Images/transparent-logo-1.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 600px auto;
      opacity: 0.10;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>

<body class="bg-white dark:bg-[#0D0F0E] text-[#0D0F0E] dark:text-white">

<!-- SUCCESS POPUP -->
<div id="successPopup" class="success-popup">Account created successfully!</div>

<!-- HEADER -->
<div id="site-header"></div>
<script src="header.js"></script>

<div class="h-28"></div>

<!-- ========================================================= -->
<!-- MODERN SIGNUP SECTION -->
<!-- ========================================================= -->
<section class="min-h-[80vh] flex items-center justify-center px-4">

  <div class="w-full max-w-xl bg-white dark:bg-[#0A0A0A] rounded-2xl shadow-2xl p-10 relative">

    <!-- PAGE TITLE -->
    <h1 class="text-3xl font-bold text-center mb-2">Create an account</h1>
    <p class="text-center text-gray-600 dark:text-gray-300 mb-8">
      Join Futuristic Haven and explore luxury properties.
    </p>

    <!-- FORM -->
    <form id="signupForm" class="space-y-6">

      <!-- NAME FIELD -->
      <div class="relative">
        <label class="text-sm font-medium">Full Name</label>
        <input id="name" type="text"
          class="w-full mt-1 px-4 py-3 rounded-xl border bg-transparent
                 border-gray-300 dark:border-gray-700 focus:ring-2 
                 focus:ring-[#00C29A] outline-none">
        <p id="nameError" class="error-text hidden"></p>
      </div>

      <!-- EMAIL FIELD -->
      <div>
        <label class="text-sm font-medium">Email Address</label>
        <input id="email" type="email"
          class="w-full mt-1 px-4 py-3 rounded-xl border bg-transparent
                 border-gray-300 dark:border-gray-700 focus:ring-2 
                 focus:ring-[#00C29A] outline-none">
        <p id="emailError" class="error-text hidden"></p>
      </div>

      <!-- PASSWORD FIELD -->
      <div class="relative">
        <label class="text-sm font-medium">Password</label>
        <input id="password" type="password"
          class="w-full mt-1 px-4 py-3 rounded-xl border bg-transparent
                 border-gray-300 dark:border-gray-700 focus:ring-2 
                 focus:ring-[#00C29A] outline-none">
        <p id="passwordError" class="error-text hidden"></p>

        <!-- SHOW / HIDE Toggle -->
        <button type="button" id="togglePass"
          class="absolute right-4 top-11 text-gray-500 dark:text-gray-300">
          👁️
        </button>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="relative">
        <label class="text-sm font-medium">Confirm Password</label>
        <input id="confirmPassword" type="password"
          class="w-full mt-1 px-4 py-3 rounded-xl border bg-transparent
                 border-gray-300 dark:border-gray-700 focus:ring-2 
                 focus:ring-[#00C29A] outline-none">
        <p id="confirmPasswordError" class="error-text hidden"></p>
      </div>

      <!-- SUBMIT BUTTON -->
      <button type="submit"
        class="w-full py-3 bg-[#00C29A] text-white rounded-xl font-semibold text-lg shadow-lg hover:bg-[#00b58d] transition">
        Create Account
      </button>

    </form>

    <!-- FOOTER TEXT -->
    <p class="text-center text-sm mt-6">
      Already have an account?
      <a href="login.html" class="text-[#00C29A] font-semibold">Log in</a>
    </p>

  </div>
</section>

<!-- FOOTER -->
<div id="site-footer"></div>
<script src="footer.js"></script>

<!-- ========================================================= -->
<!-- VALIDATION SCRIPT -->
<!-- ========================================================= -->
<script>
  const form = document.getElementById("signupForm");
  const popup = document.getElementById("successPopup");

  function showError(id, message) {
    const el = document.getElementById(id);
    el.innerHTML = "⚠️ " + message;
    el.classList.remove("hidden");
  }
  function hideError(id) {
    const el = document.getElementById(id);
    el.innerHTML = "";
    el.classList.add("hidden");
  }

  // SHOW/HIDE PASSWORD
  document.getElementById("togglePass").addEventListener("click", () => {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
  });

  form.addEventListener("submit", e => {
    e.preventDefault();

    let error = false;

    const name = nameInput = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirmPassword").value.trim();

    // VALIDATIONS
    if (name.length < 3) {
      showError("nameError", "Name must be at least 3 characters.");
      error = true;
    } else hideError("nameError");

    const emailReg = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailReg.test(email)) {
      showError("emailError", "Invalid email format.");
      error = true;
    } else hideError("emailError");

    const passReg = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{6,}$/;
    if (!passReg.test(pass)) {
      showError("passwordError", "Must contain 1 uppercase, 1 lowercase, 1 number, 6+ chars.");
      error = true;
    } else hideError("passwordError");

    if (confirm !== pass) {
      showError("confirmPasswordError", "Passwords do not match.");
      error = true;
    } else hideError("confirmPasswordError");

    // SUCCESS 
    if (!error) {
      popup.style.display = "block";
      setTimeout(() => popup.style.display = "none", 3000);
      form.reset();
    }
  });
</script>

</body>
</html>
